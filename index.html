<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<title>Site SAE 402</title>
	<link rel="icon" type="image/webp" href="src/img/apple_regular_60x60px.webp">
	<link rel="stylesheet" href="styles/style.css">
</head>
<body>
	<main>
		<div class="pile-canvas">
			<canvas id="canva-fond"></canvas>
			<canvas id="canva-minuteur"></canvas>
			<canvas id="canva-pommes"></canvas>
		</div>
		<div id="surcouche-regles" class="surcouche-jeu est-visible">
			<div class="carte-surcouche-jeu">
				<h1>REGLES DU JEU</h1>
				<ul class="liste-regles">
					<li>Ne pas couper les pommes pourries.</li>
					<li>Faire minimum 250 points.</li>
					<li>Pomme rouge = 2 points.</li>
					<li>Pommes dorées = 10 points.</li>
					<li>Il y as un secret caché pour les plus malins.</li>
				</ul>
				<p class="message-surcouche">Bonne chance !</p>
				<button id="bouton-demarrer" type="button">GO !</button>
			</div>
		</div>
		<div id="surcouche-fin-partie" class="surcouche-jeu">
			<div class="carte-surcouche-jeu">
				<h1>GAME OVER</h1>
				<p id="message-fin-partie" class="message-surcouche">Vous avez marqué 0 points.</p>
				<button id="bouton-recommencer" type="button">Recommencer</button>
			</div>
		</div>
		<div id="surcouche-victoire" class="surcouche-jeu">
			<div class="carte-surcouche-jeu carte-surcouche-jeu-victoire">
				<h1>VICTOIRE</h1>
				<p id="message-victoire" class="message-surcouche">Bravo, vous avez marqué 0 points.</p>
				<button id="bouton-continuer" type="button">Continuer</button>
			</div>
		</div>
	</main>

	<script src="js/script.js?v=20260405"></script>
	<script src="js/timer.js?v=20260405"></script>
	<script src="js/pommes.js?v=20260405"></script>
	<script src="js/gps.js?v=20260405"></script>
</body>
</html>
